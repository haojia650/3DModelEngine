<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #1f2937; }
      .label { font: 500 22px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #111827; }
      .small { font: 500 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #0f172a; stroke-width: 3; rx: 18; }
      .ellipse { fill: #ffffff; stroke: #2563eb; stroke-width: 3; }
      .line { stroke: #475569; stroke-width: 3; fill: none; }
      .dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 10 8; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#ffffff"/>
  <text x="700" y="58" text-anchor="middle" class="title">3D模型交互系统用例图</text>

  <rect x="270" y="100" width="1050" height="730" class="box"/>
  <text x="795" y="140" text-anchor="middle" class="title" font-size="26">基于OCC的三维模型交互系统</text>

  <!-- Actor -->
  <circle cx="120" cy="220" r="34" stroke="#111827" stroke-width="3" fill="none"/>
  <line x1="120" y1="254" x2="120" y2="340" class="line"/>
  <line x1="78" y1="286" x2="162" y2="286" class="line"/>
  <line x1="120" y1="340" x2="82" y2="400" class="line"/>
  <line x1="120" y1="340" x2="158" y2="400" class="line"/>
  <text x="120" y="445" text-anchor="middle" class="label">用户</text>

  <!-- Use cases -->
  <ellipse cx="540" cy="210" rx="140" ry="44" class="ellipse"/>
  <text x="540" y="218" text-anchor="middle" class="label">浏览三维场景</text>

  <ellipse cx="540" cy="330" rx="140" ry="44" class="ellipse"/>
  <text x="540" y="338" text-anchor="middle" class="label">选择单个物体</text>

  <ellipse cx="540" cy="460" rx="140" ry="44" class="ellipse"/>
  <text x="540" y="468" text-anchor="middle" class="label">移动物体</text>

  <ellipse cx="540" cy="590" rx="140" ry="44" class="ellipse"/>
  <text x="540" y="598" text-anchor="middle" class="label">旋转物体</text>

  <ellipse cx="540" cy="720" rx="140" ry="44" class="ellipse"/>
  <text x="540" y="728" text-anchor="middle" class="label">缩放物体</text>

  <ellipse cx="970" cy="280" rx="150" ry="44" class="ellipse"/>
  <text x="970" y="288" text-anchor="middle" class="label">轴向锁定（X/Y/Z）</text>

  <ellipse cx="970" cy="470" rx="150" ry="44" class="ellipse"/>
  <text x="970" y="478" text-anchor="middle" class="label">重置变换</text>

  <ellipse cx="970" cy="650" rx="150" ry="44" class="ellipse"/>
  <text x="970" y="658" text-anchor="middle" class="label">应用变换</text>

  <!-- Associations -->
  <line x1="160" y1="220" x2="400" y2="210" class="line"/>
  <line x1="160" y1="250" x2="400" y2="325" class="line"/>
  <line x1="160" y1="280" x2="400" y2="455" class="line"/>
  <line x1="160" y1="300" x2="400" y2="585" class="line"/>
  <line x1="150" y1="320" x2="400" y2="715" class="line"/>

  <line x1="160" y1="300" x2="820" y2="465" class="line"/>
  <line x1="150" y1="330" x2="820" y2="645" class="line"/>

  <!-- Extend relations -->
  <line x1="682" y1="445" x2="820" y2="300" class="dash"/>
  <text x="735" y="350" class="small">&lt;&lt;extend&gt;&gt;</text>

  <line x1="682" y1="580" x2="820" y2="300" class="dash"/>
  <text x="742" y="430" class="small">&lt;&lt;extend&gt;&gt;</text>

  <line x1="682" y1="705" x2="820" y2="300" class="dash"/>
  <text x="750" y="545" class="small">&lt;&lt;extend&gt;&gt;</text>

</svg>
